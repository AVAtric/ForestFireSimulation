name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for manual release (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-manual'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ForestFire-linux-x86_64
            asset_name: ForestFire-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: ForestFire-windows-x86_64
            asset_name: ForestFire-windows-x86_64.zip
          - os: macos-latest
            artifact_name: ForestFire-macos-arm64
            asset_name: ForestFire-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------- Linux ----------------
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev \
            libomp-dev \
            opencl-headers \
            ocl-icd-opencl-dev \
            ninja-build

      # ---------------- macOS ----------------
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp ninja
          # Install SDL2 framework into /Library/Frameworks (CMakeLists expects this path)
          SDL2_VERSION=2.30.11
          curl -L -o SDL2.dmg "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VERSION}/SDL2-${SDL2_VERSION}.dmg"
          hdiutil attach SDL2.dmg -mountpoint /Volumes/SDL2
          sudo cp -R /Volumes/SDL2/SDL2.framework /Library/Frameworks/
          hdiutil detach /Volumes/SDL2

      # ---------------- Windows ----------------
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install sdl2:x64-windows opencl:x64-windows
          vcpkg integrate install

      # ---------------- Configure ----------------
      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFORESTFIRE_BUILD_TESTS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DFORESTFIRE_BUILD_TESTS=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ---------------- Build ----------------
      - name: Build
        run: cmake --build build --config Release -j

      # ---------------- Package ----------------
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp build/ForestFire dist/${{ matrix.artifact_name }}/
          cp README.md LICENSE dist/${{ matrix.artifact_name }}/
          tar czf ${{ matrix.asset_name }} -C dist ${{ matrix.artifact_name }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp build/ForestFire dist/${{ matrix.artifact_name }}/
          cp README.md LICENSE dist/${{ matrix.artifact_name }}/
          # Bundle SDL2 framework so users don't have to install it
          cp -R /Library/Frameworks/SDL2.framework dist/${{ matrix.artifact_name }}/
          tar czf ${{ matrix.asset_name }} -C dist ${{ matrix.artifact_name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "build/Release/ForestFire.exe" "dist/${{ matrix.artifact_name }}/"
          Copy-Item "README.md" "dist/${{ matrix.artifact_name }}/"
          Copy-Item "LICENSE" "dist/${{ matrix.artifact_name }}/"
          # Copy any DLLs produced alongside the exe (vcpkg-applocal-deploy)
          Get-ChildItem "build/Release" -Filter *.dll | Copy-Item -Destination "dist/${{ matrix.artifact_name }}/"
          Compress-Archive -Path "dist/${{ matrix.artifact_name }}/*" -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
